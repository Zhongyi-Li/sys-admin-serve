app:
  name: gin-admin
  env: local

server:
  host: 0.0.0.0
  port: 8080
  mode: debug

mysql:
  host: 127.0.0.1
  port: 3306
  user: root
  password: 123456
  dbname: sys_admin_data
  charset: utf8mb4
  parse_time: true
  loc: Local
  max_idle_conns: 10
  max_open_conns: 100

redis:
  host: 127.0.0.1
  port: 6379
  password: ""
  db: 0

jwt:
  secret: your-jwt-secret
  expire_hours: 72

logger:
  level: debug
  filename: logs/app.log
  max_size: 100
  max_backups: 7
  max_age: 30
  compress: false

casbin:
  model_path: configs/rbac_model.conf
  policy_path: configs/rbac_policy.csv
